name: 'Setup Python Environment'
description: 'Configura Python y dependencias con cache'

runs:
  using: "composite"
  steps:
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Instalar dependencias
      shell: bash
      run: |
        python -m pip install --upgrade pip
        # Instalamos el paquete en modo editable y sus dependencias
        pip install -e .
        # Instalamos las herramientas de calidad y las dependencias que MyPy necesita explícitamente
        pip install black==24.10.0 flake8==7.1.1 mypy==1.13.0 pytest pytest-cov pydantic==2.5.0 typer==0.9.0 python-magic==0.4.27 regex==2023.10.3
